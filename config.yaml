champion:
  model_name: "LightGBM+Bureau"
  artifact_key: "lightgbm_bureau_model"
  metrics_key: "lightgbm_bureau_metrics"
  threshold_analysis_key: "lgbm_bureau_threshold_analysis"
  feature_set: "application+bureau"
  requires_bureau: true
  fallback_artifact_key: null
  selected_operating_threshold: "f1_optimal_threshold"
  training_data_scope:
    primary: "Home Credit application_train.csv"
    bureau: "Home Credit bureau.csv aggregated to applicant level"
    split: "Stratified 80/20 holdout using model.random_state"
  limitations:
    - "Portfolio demonstration only; not production-ready and not for automated credit decisions."
    - "The configured champion uses application_train.csv plus bureau.csv; deeper relational features are optional research workflows and are not automatically promoted."
    - "Scores are review-prioritization estimates, not calibrated approval or denial decisions."
    - "Sensitive and proxy variables require legal, compliance, and model-risk review before regulated use."

