model:
  random_state: 42
  test_size: 0.2
  cv_folds: 5
  lgbm_n_trials: 50

logistic_regression:
  class_weight: "balanced"
  max_iter: 1000
  solver: "lbfgs"

xgboost:
  n_estimators: 500
  learning_rate: 0.05
  max_depth: 6
  min_child_weight: 1
  subsample: 0.8
  colsample_bytree: 0.8
  eval_metric: "auc"
  early_stopping_rounds: 50
  objective: "binary:logistic"
  tree_method: "hist"

lightgbm:
  n_estimators: 1000
  learning_rate: 0.05
  num_leaves: 63
  min_child_samples: 20
  subsample: 0.8
  colsample_bytree: 0.8

thresholds:
  default: 0.50
  min: 0.05
  max: 0.95
  step: 0.01
  operating_points: [0.20, 0.30, 0.50, 0.70]
  sensitivity_grid: [0.20, 0.30, 0.40, 0.50, 0.60, 0.70]
  analysis_grid: [0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80, 0.85, 0.90]
  risk_tiers:
    low: 0.30
    medium: 0.59
    high: 1.01
  business_scenarios:
    lender:
      fn_cost: 10
      fp_cost: 1
    balanced:
      fn_cost: 3
      fp_cost: 3
    precision_focused:
      fn_cost: 1
      fp_cost: 3

shap:
  sample_size: 1000
  top_n: 25
  waterfall_max_display: 15
  individual_examples:
    low_max: 0.20
    medium_min: 0.35
    medium_max: 0.50
    high_min: 0.70

fairness:
  disparity_threshold: 0.05
  governance_columns:
    - "CODE_GENDER"
    - "NAME_EDUCATION_TYPE"
    - "ORGANIZATION_TYPE"
