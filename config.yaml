paths:
  raw_data: "data/raw/application_train.csv"
  bureau_data: "data/raw/bureau.csv"
  processed_data: "data/processed/"
  models_dir: "models/"
  reports_dir: "reports/"
  visuals_dir: "visuals/"

artifacts:
  logistic_model: "models/logistic_regression_baseline.joblib"
  xgboost_model: "models/xgboost_credit_risk_model.joblib"
  lightgbm_model: "models/lightgbm_pipeline.pkl"
  lightgbm_bureau_model: "models/lightgbm_bureau_pipeline.pkl"

reports:
  baseline_metrics: "reports/baseline_model_metrics.json"
  logistic_evaluation: "reports/logistic_regression_evaluation.json"
  logistic_threshold_analysis: "reports/threshold_analysis.csv"
  xgboost_metrics: "reports/xgboost_model_metrics.json"
  xgboost_threshold_analysis: "reports/xgboost_threshold_analysis.csv"
  lightgbm_metrics: "reports/lgbm_model_metrics.json"
  lightgbm_threshold_analysis: "reports/lgbm_threshold_analysis.csv"
  lightgbm_bureau_metrics: "reports/lgbm_bureau_model_metrics.json"
  lgbm_bureau_threshold_analysis: "reports/lgbm_bureau_threshold_analysis.csv"
  model_comparison_full: "reports/model_comparison_full.csv"
  model_comparison_md: "reports/model_comparison.md"
  model_card: "reports/model_card.md"
  business_recommendations: "reports/business_recommendations.md"
  shap_feature_importance: "reports/shap_feature_importance.csv"
  xgboost_feature_importance: "reports/xgboost_feature_importance.csv"
  explainability_report: "reports/explainability_report.md"
  fairness_report_csv: "reports/fairness_report.csv"
  fairness_report_md: "reports/fairness_report.md"
  cost_threshold_analysis: "reports/cost_threshold_analysis.csv"
  sample_predictions: "reports/sample_predictions.csv"

visuals:
  roc_lr: "visuals/roc_curve_logistic_regression.png"
  roc_xgboost: "visuals/roc_curve_xgboost.png"
  roc_lightgbm: "visuals/roc_curve_lightgbm.png"
  roc_lightgbm_bureau: "visuals/roc_curve_lightgbm_bureau.png"
  roc_comparison_all_models: "visuals/roc_comparison_all_models.png"
  pr_lr: "visuals/precision_recall_lr.png"
  pr_xgboost: "visuals/precision_recall_xgboost.png"
  pr_lightgbm: "visuals/precision_recall_lightgbm.png"
  pr_lightgbm_bureau: "visuals/precision_recall_lightgbm_bureau.png"
  pr_comparison_all_models: "visuals/pr_comparison_all_models.png"
  confusion_matrix_lr: "visuals/confusion_matrix_threshold_0_50.png"
  confusion_matrix_xgboost: "visuals/confusion_matrix_xgboost_threshold_0_50.png"
  confusion_matrix_lightgbm: "visuals/confusion_matrix_lightgbm_threshold_0_50.png"
  confusion_matrix_lightgbm_bureau: "visuals/confusion_matrix_lightgbm_bureau_threshold_0_50.png"
  calibration_plot: "visuals/calibration_plot.png"
  shap_feature_importance: "visuals/shap_feature_importance_xgboost.png"
  xgboost_feature_importance: "visuals/xgboost_feature_importance.png"
  shap_individual_low_risk: "visuals/shap_individual_low_risk.png"
  shap_individual_medium_risk: "visuals/shap_individual_medium_risk.png"
  shap_individual_high_risk: "visuals/shap_individual_high_risk.png"
  shap_applicant_current: "visuals/shap_applicant_current.png"
  cost_threshold_analysis: "visuals/cost_threshold_analysis.png"
  fairness_fpr_fnr_gender: "visuals/fairness_fpr_fnr_gender.png"
  fairness_auc_education: "visuals/fairness_auc_education.png"

model:
  random_state: 42
  test_size: 0.2
  cv_folds: 5
  lgbm_n_trials: 50

logistic_regression:
  class_weight: "balanced"
  max_iter: 1000
  solver: "lbfgs"

xgboost:
  n_estimators: 500
  learning_rate: 0.05
  max_depth: 6
  min_child_weight: 1
  subsample: 0.8
  colsample_bytree: 0.8
  eval_metric: "auc"
  early_stopping_rounds: 50
  objective: "binary:logistic"
  tree_method: "hist"

lightgbm:
  n_estimators: 1000
  learning_rate: 0.05
  num_leaves: 63
  min_child_samples: 20
  subsample: 0.8
  colsample_bytree: 0.8

thresholds:
  default: 0.50
  min: 0.05
  max: 0.95
  step: 0.01
  operating_points: [0.20, 0.30, 0.50, 0.70]
  sensitivity_grid: [0.20, 0.30, 0.40, 0.50, 0.60, 0.70]
  analysis_grid: [0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45, 0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80, 0.85, 0.90]
  risk_tiers:
    low: 0.30
    medium: 0.59
    high: 1.01
  business_scenarios:
    lender:
      fn_cost: 10
      fp_cost: 1
    balanced:
      fn_cost: 3
      fp_cost: 3
    precision_focused:
      fn_cost: 1
      fp_cost: 3

shap:
  sample_size: 1000
  top_n: 25
  waterfall_max_display: 15
  individual_examples:
    low_max: 0.20
    medium_min: 0.35
    medium_max: 0.50
    high_min: 0.70

fairness:
  disparity_threshold: 0.05
