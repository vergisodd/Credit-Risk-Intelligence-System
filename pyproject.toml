[tool.black]
line-length = 100
target-version = ["py310"]

[tool.ruff]
line-length = 100
target-version = "py310"
exclude = [
    ".git",
    ".pytest_cache",
    ".venv",
    "venv",
    "__pycache__",
    "notebooks",
]

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = ["E402", "E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
